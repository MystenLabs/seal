name: Docs Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'ws-resources.json'

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy Docusaurus to Walrus
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pin@v6.0.8
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: docs/site/pnpm-lock.yaml

      - name: Install dependencies
        run: cd docs/site && pnpm install --frozen-lockfile

      - name: Build site
        run: cd docs/site && pnpm run build

      - name: Deploy to Walrus
        uses: MystenLabs/walrus-sites-github-actions/deploy@554cf074616fdc211991c2c57d034baea2a13fb8 # v3
        with:
          SUI_BECH32_PRIVATE_KEY: "${{ secrets.SEAL_WALLET_PRIVATE_KEY }}"
          SUI_NETWORK: mainnet
          DIST: docs/site/build
          WS_RESOURCES: ws-resources.json
          EPOCHS: "50"
          GAS_BUDGET: "500000000"
          SITE_BUILDER_VERSION: v2

      - name: Generate sitemap
        run: site-builder --context mainnet --config sites-config.yaml sitemap @seal-docs

  notify-failure:
    name: Notify failure to slack channel
    needs: [build-and-deploy]
    if: ${{ always() && needs.build-and-deploy.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: dispatch failure notification to slack
        continue-on-error: true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with:
          repository: MystenLabs/sui-operations
          token: ${{ secrets.DOCS_DEPLOY_DISPATCH_TOKEN }}
          event-type: seal-doc-deploy
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "sha":"${{ github.sha }}",
             "ref":"${{ github.ref }}",
             "actor":"${{ github.actor }}",
             "run_id":"${{ github.run_id }}",
             "run_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
             "channel":"#seal-ci",
             "status":"failure"}
